<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>찜목록으로 이동 중</title>

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;

      background: linear-gradient(180deg, #fbfcf8 0%, #f1f5ec 100%);
      color: #1d2a1f;
    }
    .redirect-card {
      width: min(360px, calc(100vw - 32px));
      padding: 28px 24px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(61, 88, 56, 0.08);
      box-shadow: 0 18px 40px rgba(29, 42, 31, 0.10);
      text-align: center;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.3;
    }
    p {
      margin: 0;
      color: #5d6b5e;
      line-height: 1.6;
    }
    a {
      color: #476d2a;
      font-weight: 700;
    }

</head>
<body>
  <div class="redirect-card">
    <h1>찜목록으로 이동 중입니다</h1>
    <p>자동으로 이동하지 않으면 <a href="../mypage/wishlist.html">찜목록 페이지를 열기</a>를 눌러주세요.</p>
