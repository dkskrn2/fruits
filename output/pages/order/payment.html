<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 - 과일다리</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../styles/design-system.css">
    <link rel="stylesheet" href="../../styles/components.css">
    <style>
        body {
            background: var(--color-gray-50);
            padding-bottom: 80px;
        }

        @media (min-width: 768px) {
            body {
                max-width: 430px;
                margin: 0 auto;
                box-shadow: 0 0 40px rgba(0, 0, 0, 0.1);
            }
        }

        /* Header */
        .header {
            background: var(--color-white);
            border-bottom: 1px solid var(--color-gray-200);
            position: sticky;
            top: 0;
            z-index: var(--z-sticky);
            padding: var(--space-4);
            display: flex;
            align-items: center;
        }

        .header__back {
            font-size: 24px;
            cursor: pointer;
            margin-right: var(--space-4);
        }

        .header__title {
            font-size: var(--font-size-md);
            font-weight: var(--font-weight-semibold);
            color: var(--color-gray-900);
        }

        /* Progress Indicator */
        .progress-bar {
            height: 4px;
            background: var(--color-gray-200);
            position: relative;
            overflow: hidden;
        }

        .progress-bar__fill {
            height: 100%;
            background: var(--color-primary);
            transition: width 0.3s ease;
            width: 50%;
        }

        /* Content */
        .content {
            padding: var(--space-4);
        }

        /* Order Summary */
        .order-summary {
            background: var(--color-white);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
        }

        .order-summary__title {
            font-size: var(--font-size-md);
            font-weight: var(--font-weight-semibold);
            margin-bottom: var(--space-4);
        }

        .order-item {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3);
            background: var(--color-gray-50);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-2);
        }

        .order-item__image {
            width: 60px;
            height: 60px;
            border-radius: var(--radius-md);
            background: var(--color-gray-200);
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .order-item__info {
            flex: 1;
        }

        .order-item__name {
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            margin-bottom: var(--space-1);
        }

        .order-item__detail {
            font-size: var(--font-size-xs);
            color: var(--color-gray-600);
        }

        .order-item__price {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-semibold);
            color: var(--color-gray-900);
        }

        .order-summary__total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: var(--space-4);
            border-top: 2px solid var(--color-gray-200);
            margin-top: var(--space-3);
        }

        .order-summary__total-label {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-medium);
        }

        .order-summary__total-price {
            font-size: var(--font-size-xl);
            font-weight: var(--font-weight-bold);
            color: var(--color-primary);
        }

        /* Payment Method */
        .payment-section {
            background: var(--color-white);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
        }

        .section-title {
            font-size: var(--font-size-md);
            font-weight: var(--font-weight-semibold);
            margin-bottom: var(--space-4);
        }

        .payment-methods {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-2);
            margin-bottom: var(--space-4);
        }

        .payment-method {
            padding: var(--space-3);
            border: 2px solid var(--color-gray-300);
            border-radius: var(--radius-md);
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            background: var(--color-white);
        }

        .payment-method:active {
            transform: scale(0.95);
        }

        .payment-method.active {
            border-color: var(--color-primary);
            background: var(--color-primary-light);
        }

        .payment-method__icon {
            font-size: 28px;
            margin-bottom: var(--space-1);
        }

        .payment-method__name {
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-medium);
            color: var(--color-gray-700);
        }

        .payment-method.active .payment-method__name {
            color: var(--color-primary-dark);
        }

        /* Card Form */
        .card-form {
            display: none;
            animation: slideDown 0.3s ease;
        }

        .card-form.active {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-2);
        }

        /* Terms Agreement */
        .terms-section {
            background: var(--color-white);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            padding: var(--space-3) 0;
            cursor: pointer;
        }

        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: var(--space-3);
            cursor: pointer;
            accent-color: var(--color-primary);
        }

        .checkbox-item__label {
            flex: 1;
            font-size: var(--font-size-sm);
            color: var(--color-gray-700);
        }

        .checkbox-item__link {
            color: var(--color-gray-500);
            font-size: var(--font-size-xs);
            text-decoration: none;
            margin-left: var(--space-2);
        }

        .checkbox-all {
            border-bottom: 2px solid var(--color-gray-200);
            padding-bottom: var(--space-3);
            margin-bottom: var(--space-2);
        }

        .checkbox-all .checkbox-item__label {
            font-weight: var(--font-weight-semibold);
        }

        /* Security Badges */
        .security-badges {
            display: flex;
            justify-content: center;
            gap: var(--space-4);
            padding: var(--space-4);
            background: var(--color-gray-50);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-4);
        }

        .security-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-1);
        }

        .security-badge__icon {
            font-size: 24px;
        }

        .security-badge__text {
            font-size: var(--font-size-xs);
            color: var(--color-gray-600);
        }

        /* Pay Button */
        .pay-button-container {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            padding: var(--space-4);
            background: var(--color-white);
            border-top: 1px solid var(--color-gray-200);
            z-index: var(--z-sticky);
        }

        .pay-button {
            width: 100%;
            padding: var(--space-4);
            background: var(--color-primary);
            color: var(--color-white);
            border: none;
            border-radius: var(--radius-lg);
            font-size: var(--font-size-md);
            font-weight: var(--font-weight-semibold);
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
        }

        .pay-button:active:not(:disabled) {
            transform: scale(0.98);
        }

        .pay-button:disabled {
            background: var(--color-gray-300);
            cursor: not-allowed;
        }

        .pay-button__loader {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .pay-button.loading .pay-button__text {
            opacity: 0;
        }

        .pay-button.loading .pay-button__loader {
            display: block;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Loading Overlay */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: var(--z-modal);
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-content {
            background: var(--color-white);
            border-radius: var(--radius-xl);
            padding: var(--space-8);
            text-align: center;
            max-width: 280px;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-content__spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--color-gray-200);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            margin: 0 auto var(--space-4);
            animation: spin 0.8s linear infinite;
        }

        .loading-content__text {
            font-size: var(--font-size-md);
            font-weight: var(--font-weight-medium);
            color: var(--color-gray-900);
            margin-bottom: var(--space-2);
        }

        .loading-content__desc {
            font-size: var(--font-size-sm);
            color: var(--color-gray-600);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <span class="header__back" onclick="history.back()">←</span>
        <h1 class="header__title">결제</h1>
    </header>

    <!-- Progress Bar -->
    <div class="progress-bar">
        <div class="progress-bar__fill" id="progressBar"></div>
    </div>

    <!-- Main Content -->
    <main class="content">
        <!-- Order Summary -->
        <section class="order-summary">
            <h2 class="order-summary__title">주문 상품</h2>

            <div class="order-item">
                <div class="order-item__image">🍎</div>
                <div class="order-item__info">
                    <div class="order-item__name">청송 사과</div>
                    <div class="order-item__detail">5kg / 수량: 1개</div>
                </div>
                <div class="order-item__price">45,000원</div>
            </div>

            <div class="order-item">
                <div class="order-item__image">🍊</div>
                <div class="order-item__info">
                    <div class="order-item__name">제주 감귤</div>
                    <div class="order-item__detail">3kg / 수량: 1개</div>
                </div>
                <div class="order-item__price">28,000원</div>
            </div>

            <div class="order-summary__total">
                <span class="order-summary__total-label">총 결제금액</span>
                <span class="order-summary__total-price">73,000원</span>
            </div>
        </section>

        <!-- Payment Method -->
        <section class="payment-section">
            <h2 class="section-title">결제 수단</h2>

            <div class="payment-methods">
                <div class="payment-method active" data-method="card">
                    <div class="payment-method__icon">💳</div>
                    <div class="payment-method__name">카드</div>
                </div>
                <div class="payment-method" data-method="bank">
                    <div class="payment-method__icon">🏦</div>
                    <div class="payment-method__name">계좌이체</div>
                </div>
                <div class="payment-method" data-method="simple">
                    <div class="payment-method__icon">📱</div>
                    <div class="payment-method__name">간편결제</div>
                </div>
            </div>

            <!-- Card Form -->
            <div class="card-form active" id="cardForm">
                <div class="form-group">
                    <label class="form-label">카드번호</label>
                    <input type="text" class="input" id="cardNumber" placeholder="0000-0000-0000-0000" maxlength="19">
                </div>

                <div class="input-row">
                    <div class="form-group">
                        <label class="form-label">유효기간</label>
                        <input type="text" class="input" id="cardExpiry" placeholder="MM/YY" maxlength="5">
                    </div>
                    <div class="form-group">
                        <label class="form-label">CVC</label>
                        <input type="text" class="input" id="cardCvc" placeholder="000" maxlength="3">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">카드 비밀번호 앞 2자리</label>
                    <input type="password" class="input" id="cardPassword" placeholder="••" maxlength="2">
                </div>
            </div>

            <!-- Bank Transfer Message -->
            <div class="card-form" id="bankForm">
                <div style="padding: var(--space-4); background: var(--color-gray-50); border-radius: var(--radius-md); text-align: center;">
                    <div style="font-size: 36px; margin-bottom: var(--space-3);">🏦</div>
                    <div style="font-size: var(--font-size-base); color: var(--color-gray-700); margin-bottom: var(--space-2);">
                        주문 완료 후 가상계좌가 발급됩니다
                    </div>
                    <div style="font-size: var(--font-size-sm); color: var(--color-gray-600);">
                        입금 확인 후 배송이 시작됩니다
                    </div>
                </div>
            </div>

            <!-- Simple Payment Message -->
            <div class="card-form" id="simpleForm">
                <div style="padding: var(--space-4); background: var(--color-gray-50); border-radius: var(--radius-md); text-align: center;">
                    <div style="font-size: 36px; margin-bottom: var(--space-3);">📱</div>
                    <div style="font-size: var(--font-size-base); color: var(--color-gray-700); margin-bottom: var(--space-2);">
                        간편결제를 선택하셨습니다
                    </div>
                    <div style="font-size: var(--font-size-sm); color: var(--color-gray-600);">
                        카카오페이, 네이버페이 등 선택 가능
                    </div>
                </div>
            </div>
        </section>

        <!-- Terms Agreement -->
        <section class="terms-section">
            <h2 class="section-title">약관 동의</h2>

            <div class="checkbox-all">
                <label class="checkbox-item">
                    <input type="checkbox" id="agreeAll">
                    <span class="checkbox-item__label">전체 동의</span>
                </label>
            </div>

            <label class="checkbox-item">
                <input type="checkbox" class="agree-item" data-required="true">
                <span class="checkbox-item__label">구매조건 및 결제대행 서비스 약관 동의 (필수)</span>
                <a href="#" class="checkbox-item__link">보기</a>
            </label>

            <label class="checkbox-item">
                <input type="checkbox" class="agree-item" data-required="true">
                <span class="checkbox-item__label">개인정보 수집 및 이용 동의 (필수)</span>
                <a href="#" class="checkbox-item__link">보기</a>
            </label>

            <label class="checkbox-item">
                <input type="checkbox" class="agree-item">
                <span class="checkbox-item__label">마케팅 정보 수신 동의 (선택)</span>
                <a href="#" class="checkbox-item__link">보기</a>
            </label>
        </section>

        <!-- Security Badges -->
        <div class="security-badges">
            <div class="security-badge">
                <div class="security-badge__icon">🔒</div>
                <div class="security-badge__text">보안결제</div>
            </div>
            <div class="security-badge">
                <div class="security-badge__icon">✅</div>
                <div class="security-badge__text">구매안전</div>
            </div>
            <div class="security-badge">
                <div class="security-badge__icon">🛡️</div>
                <div class="security-badge__text">정보보호</div>
            </div>
        </div>
    </main>

    <!-- Pay Button -->
    <div class="pay-button-container">
        <button class="pay-button" id="payButton" disabled>
            <span class="pay-button__text">73,000원 결제하기</span>
            <div class="pay-button__loader">
                <div class="spinner"></div>
            </div>
        </button>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-content__spinner"></div>
            <div class="loading-content__text">결제 진행중</div>
            <div class="loading-content__desc">잠시만 기다려주세요...</div>
        </div>
    </div>

    <script>
        // Elements
        const paymentMethods = document.querySelectorAll('.payment-method');
        const cardForm = document.getElementById('cardForm');
        const bankForm = document.getElementById('bankForm');
        const simpleForm = document.getElementById('simpleForm');
        const agreeAll = document.getElementById('agreeAll');
        const agreeItems = document.querySelectorAll('.agree-item');
        const payButton = document.getElementById('payButton');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const progressBar = document.getElementById('progressBar');

        // Card inputs
        const cardNumber = document.getElementById('cardNumber');
        const cardExpiry = document.getElementById('cardExpiry');
        const cardCvc = document.getElementById('cardCvc');
        const cardPassword = document.getElementById('cardPassword');

        let selectedMethod = 'card';

        // Payment method switching
        paymentMethods.forEach(method => {
            method.addEventListener('click', function() {
                paymentMethods.forEach(m => m.classList.remove('active'));
                this.classList.add('active');
                selectedMethod = this.dataset.method;

                // Hide all forms
                cardForm.classList.remove('active');
                bankForm.classList.remove('active');
                simpleForm.classList.remove('active');

                // Show selected form
                if (selectedMethod === 'card') {
                    cardForm.classList.add('active');
                } else if (selectedMethod === 'bank') {
                    bankForm.classList.add('active');
                } else {
                    simpleForm.classList.add('active');
                }

                checkFormValidity();
            });
        });

        // Card number formatting
        cardNumber.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\s/g, '');
            let formattedValue = value.match(/.{1,4}/g)?.join('-') || value;
            e.target.value = formattedValue;
            checkFormValidity();
        });

        // Expiry formatting
        cardExpiry.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.slice(0, 2) + '/' + value.slice(2, 4);
            }
            e.target.value = value;
            checkFormValidity();
        });

        // CVC validation
        cardCvc.addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g, '');
            checkFormValidity();
        });

        // Password validation
        cardPassword.addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g, '');
            checkFormValidity();
        });

        // Agree all checkbox
        agreeAll.addEventListener('change', function() {
            agreeItems.forEach(item => {
                item.checked = this.checked;
            });
            checkFormValidity();
        });

        // Individual checkboxes
        agreeItems.forEach(item => {
            item.addEventListener('change', function() {
                const allChecked = Array.from(agreeItems).every(i => i.checked);
                agreeAll.checked = allChecked;
                checkFormValidity();
            });
        });

        // Check form validity
        function checkFormValidity() {
            let isValid = false;

            // Check required agreements
            const requiredAgreements = Array.from(agreeItems)
                .filter(item => item.dataset.required === 'true')
                .every(item => item.checked);

            if (!requiredAgreements) {
                payButton.disabled = true;
                return;
            }

            // Check payment method specific requirements
            if (selectedMethod === 'card') {
                const cardNumberValid = cardNumber.value.replace(/-/g, '').length === 16;
                const expiryValid = cardExpiry.value.length === 5;
                const cvcValid = cardCvc.value.length === 3;
                const passwordValid = cardPassword.value.length === 2;

                isValid = cardNumberValid && expiryValid && cvcValid && passwordValid;
            } else {
                // Bank transfer and simple payment don't require additional validation
                isValid = true;
            }

            payButton.disabled = !isValid;

            // Update progress bar
            if (isValid) {
                progressBar.style.width = '100%';
            } else if (requiredAgreements) {
                progressBar.style.width = '75%';
            }
        }

        // Payment processing
        payButton.addEventListener('click', async function() {
            if (this.disabled) return;

            // Show loading
            this.classList.add('loading');
            loadingOverlay.classList.add('active');

            // Simulate payment processing
            setTimeout(() => {
                // Success - redirect to success page
                window.location.href = './payment-success.html';
            }, 2000);
        });

        // Prevent form link clicks
        document.querySelectorAll('.checkbox-item__link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                alert('약관 내용을 보여줍니다.');
            });
        });

        // Initialize
        checkFormValidity();
    </script>
</body>
</html>
