<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>아이디 찾기 - 과일다리</title>
    <link rel="stylesheet" href="../../styles/design-system.css">
    <link rel="stylesheet" href="../../styles/components.css">
    <style>
        /* Find ID Page Specific Styles */
        .page-container {
            width: 430px;
            margin: 0 auto;
            background: var(--color-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .find-header {
            padding: var(--space-4);
            position: relative;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--color-gray-100);
        }

        .back-button {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            border-radius: var(--radius-full);
            font-size: 24px;
            cursor: pointer;
            transition: background var(--transition-fast);
        }

        .back-button:active {
            background: var(--color-gray-50);
        }

        .header-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: var(--font-size-md);
            font-weight: 600;
            color: var(--color-gray-900);
        }

        /* Page Title Section */
        .page-title-section {
            padding: var(--space-6) var(--space-4);
            text-align: center;
        }

        .icon-wrapper {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #6FCF3F, #5CB82F);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto var(--space-4);
        }

        .page-title {
            font-size: var(--font-size-xl);
            font-weight: 700;
            color: var(--color-gray-900);
            margin-bottom: var(--space-2);
        }

        .page-description {
            font-size: var(--font-size-sm);
            color: var(--color-gray-600);
            line-height: var(--line-height-relaxed);
        }

        /* Form Section */
        .form-section {
            padding: 0 var(--space-4);
            flex: 1;
        }

        /* Verification Method Selection */
        .verification-methods {
            display: flex;
            gap: var(--space-3);
            margin-bottom: var(--space-6);
        }

        .method-option {
            flex: 1;
            padding: var(--space-4);
            border: 2px solid var(--color-gray-200);
            border-radius: var(--radius-lg);
            background: var(--color-white);
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .method-option:active {
            transform: scale(0.97);
        }

        .method-option.active {
            border-color: var(--color-primary);
            background: var(--color-primary-light);
        }

        .method-icon {
            font-size: 32px;
            margin-bottom: var(--space-2);
        }

        .method-label {
            font-size: var(--font-size-sm);
            font-weight: 500;
            color: var(--color-gray-700);
        }

        .method-option.active .method-label {
            color: var(--color-primary-dark);
        }

        /* Form Groups */
        .form-group {
            margin-bottom: var(--space-4);
        }

        .form-label {
            display: block;
            font-size: var(--font-size-sm);
            font-weight: 500;
            color: var(--color-gray-700);
            margin-bottom: var(--space-2);
        }

        .form-input {
            width: 100%;
            padding: var(--space-4);
            border: 1px solid var(--color-gray-200);
            border-radius: var(--radius-lg);
            font-size: var(--font-size-base);
            transition: all var(--transition-fast);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(111, 207, 63, 0.1);
        }

        .form-input.error {
            border-color: var(--color-error);
        }

        .input-with-button {
            display: flex;
            gap: var(--space-2);
        }

        .input-with-button .form-input {
            flex: 1;
        }

        .verify-btn {
            padding: 0 var(--space-5);
            background: var(--color-primary);
            color: var(--color-white);
            border: none;
            border-radius: var(--radius-lg);
            font-size: var(--font-size-sm);
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .verify-btn:active {
            background: var(--color-primary-dark);
        }

        .verify-btn:disabled {
            background: var(--color-gray-300);
            cursor: not-allowed;
        }

        /* Timer */
        .code-input-wrapper {
            position: relative;
        }

        .timer {
            position: absolute;
            right: var(--space-4);
            top: 50%;
            transform: translateY(-50%);
            font-size: var(--font-size-sm);
            color: var(--color-error);
            font-weight: 600;
        }

        .code-input-wrapper .form-input {
            padding-right: 80px;
        }

        /* Helper Text */
        .form-helper {
            font-size: var(--font-size-xs);
            color: var(--color-gray-600);
            margin-top: var(--space-1);
        }

        .form-error {
            font-size: var(--font-size-xs);
            color: var(--color-error);
            margin-top: var(--space-1);
            display: none;
        }

        .form-error.show {
            display: block;
        }

        /* Found ID Result */
        .result-section {
            display: none;
            padding: var(--space-4);
            background: var(--color-gray-50);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-6);
        }

        .result-section.show {
            display: block;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            margin-bottom: var(--space-3);
        }

        .result-icon {
            width: 40px;
            height: 40px;
            background: var(--color-primary);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .result-title {
            font-size: var(--font-size-base);
            font-weight: 600;
            color: var(--color-gray-900);
        }

        .found-id {
            padding: var(--space-4);
            background: var(--color-white);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-3);
        }

        .found-id-label {
            font-size: var(--font-size-xs);
            color: var(--color-gray-600);
            margin-bottom: var(--space-1);
        }

        .found-id-value {
            font-size: var(--font-size-md);
            font-weight: 600;
            color: var(--color-gray-900);
            letter-spacing: 0.5px;
        }

        .found-id-date {
            font-size: var(--font-size-xs);
            color: var(--color-gray-500);
            margin-top: var(--space-1);
        }

        /* Buttons */
        .btn-wrapper {
            padding: var(--space-4);
            background: var(--color-white);
            border-top: 1px solid var(--color-gray-100);
        }

        .btn-full {
            width: 100%;
            padding: var(--space-4);
            border: none;
            border-radius: var(--radius-lg);
            font-size: var(--font-size-md);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .btn-primary {
            background: var(--color-primary);
            color: var(--color-white);
            margin-bottom: var(--space-2);
        }

        .btn-primary:active {
            background: var(--color-primary-dark);
            transform: scale(0.98);
        }

        .btn-secondary {
            background: var(--color-gray-100);
            color: var(--color-gray-700);
        }

        .btn-secondary:active {
            background: var(--color-gray-200);
            transform: scale(0.98);
        }

        /* Hidden State */
        .hidden {
            display: none;
        }

        /* Loading State */
        .loading {
            position: relative;
            pointer-events: none;
        }

        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin: -10px 0 0 -10px;
            border: 2px solid var(--color-white);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- Header -->
        <header class="find-header">
            <button class="back-button" onclick="history.back()">←</button>
            <h1 class="header-title">아이디 찾기</h1>
        </header>

        <!-- Page Title -->
        <div class="page-title-section">
            <div class="icon-wrapper">🔍</div>
            <h2 class="page-title">아이디를 찾아드릴게요</h2>
            <p class="page-description">가입 시 입력하신 정보로<br>아이디를 찾을 수 있어요</p>
        </div>

        <!-- Form Section -->
        <div class="form-section" id="form-section">
            <!-- Verification Method Selection -->
            <div class="verification-methods">
                <div class="method-option active" onclick="selectMethod('phone')" data-method="phone">
                    <div class="method-icon">📱</div>
                    <div class="method-label">휴대폰 인증</div>
                </div>
                <div class="method-option" onclick="selectMethod('email')" data-method="email">
                    <div class="method-icon">✉️</div>
                    <div class="method-label">이메일 인증</div>
                </div>
            </div>

            <form id="find-id-form">
                <!-- Name Input -->
                <div class="form-group">
                    <label class="form-label">이름</label>
                    <input
                        type="text"
                        class="form-input"
                        id="name"
                        placeholder="이름을 입력하세요"
                        required
                    >
                    <div class="form-error" id="name-error">이름을 입력해주세요</div>
                </div>

                <!-- Phone Input (Default) -->
                <div class="form-group" id="phone-group">
                    <label class="form-label">휴대폰 번호</label>
                    <div class="input-with-button">
                        <input
                            type="tel"
                            class="form-input"
                            id="phone"
                            placeholder="010-1234-5678"
                            maxlength="13"
                        >
                        <button type="button" class="verify-btn" onclick="sendVerificationCode()">인증번호 받기</button>
                    </div>
                    <div class="form-helper">'-'를 포함하여 입력해주세요</div>
                    <div class="form-error" id="phone-error">올바른 휴대폰 번호를 입력해주세요</div>
                </div>

                <!-- Email Input (Hidden by default) -->
                <div class="form-group hidden" id="email-group">
                    <label class="form-label">이메일</label>
                    <div class="input-with-button">
                        <input
                            type="email"
                            class="form-input"
                            id="email"
                            placeholder="example@email.com"
                        >
                        <button type="button" class="verify-btn" onclick="sendVerificationCode()">인증번호 받기</button>
                    </div>
                    <div class="form-error" id="email-error">올바른 이메일을 입력해주세요</div>
                </div>

                <!-- Verification Code Input (Hidden initially) -->
                <div class="form-group hidden" id="code-group">
                    <label class="form-label">인증번호</label>
                    <div class="code-input-wrapper">
                        <input
                            type="text"
                            class="form-input"
                            id="verification-code"
                            placeholder="인증번호 6자리"
                            maxlength="6"
                        >
                        <span class="timer" id="timer">03:00</span>
                    </div>
                    <div class="form-helper">인증번호를 입력해주세요</div>
                    <div class="form-error" id="code-error">인증번호가 일치하지 않습니다</div>
                </div>

                <!-- Found ID Result -->
                <div class="result-section" id="result-section">
                    <div class="result-header">
                        <div class="result-icon">✓</div>
                        <div class="result-title">아이디를 찾았어요!</div>
                    </div>
                    <div class="found-id">
                        <div class="found-id-label">아이디</div>
                        <div class="found-id-value" id="found-id-value"></div>
                        <div class="found-id-date" id="found-id-date"></div>
                    </div>
                </div>
            </form>
        </div>

        <!-- Action Buttons -->
        <div class="btn-wrapper">
            <button class="btn-full btn-primary" id="find-btn" onclick="findId()">아이디 찾기</button>
            <button class="btn-full btn-primary hidden" id="login-btn" onclick="goToLogin()">로그인하기</button>
            <button class="btn-full btn-secondary" onclick="goToFindPassword()">비밀번호 찾기</button>
        </div>
    </div>

    <script>
        let currentMethod = 'phone';
        let verificationCodeSent = false;
        let timerInterval = null;
        let timeLeft = 180; // 3 minutes

        // Select verification method
        function selectMethod(method) {
            currentMethod = method;

            // Update UI
            document.querySelectorAll('.method-option').forEach(option => {
                option.classList.remove('active');
            });
            document.querySelector(`[data-method="${method}"]`).classList.add('active');

            // Show/hide input groups
            if (method === 'phone') {
                document.getElementById('phone-group').classList.remove('hidden');
                document.getElementById('email-group').classList.add('hidden');
                document.getElementById('phone').required = true;
                document.getElementById('email').required = false;
            } else {
                document.getElementById('phone-group').classList.add('hidden');
                document.getElementById('email-group').classList.remove('hidden');
                document.getElementById('phone').required = false;
                document.getElementById('email').required = true;
            }

            // Hide code input if changing methods
            if (verificationCodeSent) {
                document.getElementById('code-group').classList.add('hidden');
                verificationCodeSent = false;
                stopTimer();
            }
        }

        // Phone number formatting
        document.getElementById('phone').addEventListener('input', function(e) {
            let value = e.target.value.replace(/[^0-9]/g, '');
            let formatted = '';

            if (value.length <= 3) {
                formatted = value;
            } else if (value.length <= 7) {
                formatted = value.slice(0, 3) + '-' + value.slice(3);
            } else {
                formatted = value.slice(0, 3) + '-' + value.slice(3, 7) + '-' + value.slice(7, 11);
            }

            e.target.value = formatted;
        });

        // Send verification code
        function sendVerificationCode() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;

            // Clear errors
            clearErrors();

            // Validation
            if (!name) {
                showError('name', '이름을 입력해주세요');
                return;
            }

            if (currentMethod === 'phone') {
                if (!phone || phone.length < 13) {
                    showError('phone', '올바른 휴대폰 번호를 입력해주세요');
                    return;
                }
            } else {
                if (!email || !email.includes('@')) {
                    showError('email', '올바른 이메일을 입력해주세요');
                    return;
                }
            }

            // Simulate sending code
            const target = currentMethod === 'phone' ? phone : email;
            alert(`${target}로 인증번호를 발송했습니다.\n(테스트: 123456)`);

            // Show code input
            document.getElementById('code-group').classList.remove('hidden');
            verificationCodeSent = true;

            // Start timer
            startTimer();
        }

        // Timer functions
        function startTimer() {
            timeLeft = 180;
            updateTimerDisplay();

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();

                if (timeLeft <= 0) {
                    stopTimer();
                    alert('인증 시간이 만료되었습니다.\n인증번호를 다시 받아주세요.');
                    document.getElementById('code-group').classList.add('hidden');
                    verificationCodeSent = false;
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').textContent =
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // Find ID
        function findId() {
            const name = document.getElementById('name').value;
            const code = document.getElementById('verification-code').value;

            // Clear errors
            clearErrors();

            // Validation
            if (!name) {
                showError('name', '이름을 입력해주세요');
                return;
            }

            if (!verificationCodeSent) {
                alert('인증번호를 먼저 받아주세요');
                return;
            }

            if (!code || code.length !== 6) {
                showError('code', '인증번호 6자리를 입력해주세요');
                return;
            }

            // Simulate verification (in real app, verify with server)
            if (code !== '123456') {
                showError('code', '인증번호가 일치하지 않습니다');
                return;
            }

            // Show loading
            const findBtn = document.getElementById('find-btn');
            findBtn.classList.add('loading');
            findBtn.disabled = true;
            findBtn.textContent = '찾는 중...';

            // Simulate API call
            setTimeout(() => {
                stopTimer();

                // Show result
                const maskedId = maskId('user1234');
                const joinDate = '2023년 5월 15일';

                document.getElementById('found-id-value').textContent = maskedId;
                document.getElementById('found-id-date').textContent = `가입일: ${joinDate}`;
                document.getElementById('result-section').classList.add('show');

                // Update buttons
                document.getElementById('find-btn').classList.add('hidden');
                document.getElementById('login-btn').classList.remove('hidden');

                // Hide form inputs
                document.getElementById('code-group').classList.add('hidden');
            }, 1500);
        }

        // Mask ID (show first 2 and last 2 characters)
        function maskId(id) {
            if (id.length <= 4) return id;
            const start = id.slice(0, 2);
            const end = id.slice(-2);
            const middle = '*'.repeat(id.length - 4);
            return start + middle + end;
        }

        // Error handling
        function showError(field, message) {
            const input = document.getElementById(field);
            const error = document.getElementById(field + '-error');

            input.classList.add('error');
            error.textContent = message;
            error.classList.add('show');
        }

        function clearErrors() {
            document.querySelectorAll('.form-input').forEach(input => {
                input.classList.remove('error');
            });
            document.querySelectorAll('.form-error').forEach(error => {
                error.classList.remove('show');
            });
        }

        // Clear error on input
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('input', function() {
                this.classList.remove('error');
                const error = document.getElementById(this.id + '-error');
                if (error) error.classList.remove('show');
            });
        });

        // Navigation
        function goToLogin() {
            window.location.href = '/pages/auth/login.html';
        }

        function goToFindPassword() {
            window.location.href = '/pages/auth/find-password.html';
        }

        // Cleanup timer on page unload
        window.addEventListener('beforeunload', () => {
            stopTimer();
        });
    </script>
</body>
</html>
