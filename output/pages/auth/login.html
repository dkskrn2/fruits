<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>로그인 - 과일다리</title>
    <link rel="stylesheet" href="../../styles/design-system.css">
    <link rel="stylesheet" href="../../styles/components.css">
    <link rel="stylesheet" href="../../styles/common-layout.css">
</head>
<body>
    <div class="auth-container">
        <!-- Header -->
        <header class="auth-header">
            <button class="btn-icon" onclick="history.back()">✕</button>
        </header>

        <!-- Logo Section -->
        <div class="auth-logo-section">
            <div class="auth-logo">🍊</div>
            <h1 class="auth-brand-name">과일다리</h1>
            <p class="auth-brand-tagline">신선한 과일로 이어지는 행복한 다리</p>
        </div>

        <!-- Login Form -->
        <form class="auth-form" onsubmit="handleLogin(event)">
            <div class="field">
                <input
                    type="text"
                    class="control"
                    id="username"
                    placeholder="아이디 또는 이메일"
                    required
                >
                <div class="helper error" id="username-error">아이디 또는 이메일을 입력해주세요</div>
            </div>

            <div class="field">
                <div class="password-wrapper">
                    <input
                        type="password"
                        class="control"
                        id="password"
                        placeholder="비밀번호"
                        required
                    >
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <span id="password-icon">👁️</span>
                    </button>
                </div>
                <div class="helper error" id="password-error">비밀번호를 입력해주세요</div>
            </div>

            <div class="login-options">
                <div class="remember-me">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" class="checkbox-input" id="remember">
                        <div class="checkbox-custom"></div>
                    </div>
                    <label for="remember" class="remember-label">자동 로그인</label>
                </div>
                <div class="find-links">
                    <a href="/auth/find-id" class="find-link">아이디 찾기</a>
                    <span class="find-divider">|</span>
                    <a href="/auth/find-password" class="find-link">비밀번호 찾기</a>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="login-btn">로그인</button>
        </form>

        <!-- Social Login -->
        <div class="social-section">
            <div class="social-divider">
                <span class="social-divider-text">간편 로그인</span>
            </div>
            <div class="social-buttons">
                <button class="social-button kakao" onclick="socialLogin('kakao')">
                    <div class="social-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M12 3C6.477 3 2 6.477 2 10.5c0 2.615 1.824 4.903 4.563 6.186-.2.732-.728 2.665-.744 2.748-.023.108.04.212.144.237.104.025.215-.02.277-.09.806-.917 2.95-3.35 3.31-3.76C10.344 15.937 11.16 16 12 16c5.523 0 10-3.477 10-7.5S17.523 3 12 3z" fill="var(--color-text-primary)"/>
                        </svg>
                    </div>
                </button>
                <button class="social-button naver" onclick="socialLogin('naver')">
                    <div class="social-icon">
                        <span style="color: white; font-weight: bold;">N</span>
                    </div>
                </button>
                <button class="social-button google" onclick="socialLogin('google')">
                    <div class="social-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                    </div>
                </button>
            </div>
        </div>

        <!-- Signup Link -->
        <div class="signup-section">
            <span class="signup-text">아직 회원이 아니신가요?</span>
            <a href="/auth/signup" class="signup-link">회원가입</a>
        </div>
    </div>

    <script>
        // Handle login
        function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('login-btn');

            // Clear previous errors
            document.querySelectorAll('.form-input').forEach(input => {
                input.classList.remove('error');
            });
            document.querySelectorAll('.error-message').forEach(msg => {
                msg.classList.remove('show');
            });

            // Basic validation
            let hasError = false;

            if (!username) {
                document.getElementById('username').classList.add('error');
                document.getElementById('username-error').classList.add('show');
                hasError = true;
            }

            if (!password) {
                document.getElementById('password').classList.add('error');
                document.getElementById('password-error').classList.add('show');
                hasError = true;
            }

            if (hasError) return;

            // Show loading state
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            loginBtn.textContent = '로그인 중...';

            // Simulate login
            setTimeout(() => {
                // Success
                alert('로그인 성공!');
                location.href = '/';
            }, 1500);
        }

        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('password-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                passwordIcon.textContent = '👁️';
            }
        }

        // Social login
        function socialLogin(provider) {
            const messages = {
                kakao: '카카오 로그인을 시작합니다...',
                naver: '네이버 로그인을 시작합니다...',
                google: '구글 로그인을 시작합니다...'
            };

            alert(messages[provider]);
            // In real app, would redirect to OAuth provider
        }

        // Clear errors on input
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('input', function() {
                this.classList.remove('error');
                const errorMsg = this.parentElement.querySelector('.error-message') ||
                               this.parentElement.parentElement.querySelector('.error-message');
                if (errorMsg) {
                    errorMsg.classList.remove('show');
                }
            });
        });
    </script>
</body>
</html>
