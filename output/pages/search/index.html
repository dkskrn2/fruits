<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합검색 - 과일다리</title>
    <link rel="stylesheet" href="../../styles/design-system.css">
    <link rel="stylesheet" href="../../styles/components.css">
    <style>
        body {
            padding-bottom: var(--bottom-nav-height);
            background: var(--color-gray-50);
        }

        /* Search Header */
        .search-header {
            position: sticky;
            top: 0;
            z-index: var(--z-sticky);
            background: var(--color-white);
            border-bottom: 1px solid var(--color-gray-200);
            padding: var(--space-3) var(--space-4);
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .search-bar__back {
            font-size: 24px;
            cursor: pointer;
            color: var(--color-gray-700);
        }

        .search-bar__input-wrapper {
            flex: 1;
            position: relative;
        }

        .search-bar__input {
            width: 100%;
            padding: var(--space-3) var(--space-10) var(--space-3) var(--space-4);
            font-size: var(--font-size-base);
            border: 1px solid var(--color-gray-300);
            border-radius: var(--radius-full);
            background: var(--color-gray-50);
            transition: all var(--transition-fast);
        }

        .search-bar__input:focus {
            outline: none;
            border-color: var(--color-primary);
            background: var(--color-white);
        }

        .search-bar__clear {
            position: absolute;
            right: var(--space-3);
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-gray-400);
            color: var(--color-white);
            border-radius: var(--radius-full);
            font-size: 14px;
            cursor: pointer;
            display: none;
        }

        .search-bar__clear.visible {
            display: flex;
        }

        /* Auto Suggestions */
        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--color-white);
            border: 1px solid var(--color-gray-200);
            border-radius: var(--radius-lg);
            margin-top: var(--space-2);
            box-shadow: var(--shadow-lg);
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: var(--z-dropdown);
        }

        .suggestions.visible {
            display: block;
        }

        .suggestion-item {
            padding: var(--space-3) var(--space-4);
            display: flex;
            align-items: center;
            gap: var(--space-3);
            cursor: pointer;
            transition: all var(--transition-fast);
            border-bottom: 1px solid var(--color-gray-100);
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:active {
            background: var(--color-gray-50);
        }

        .suggestion-item__icon {
            font-size: 18px;
            color: var(--color-gray-500);
        }

        .suggestion-item__text {
            flex: 1;
            font-size: var(--font-size-base);
            color: var(--color-gray-900);
        }

        .suggestion-item__text mark {
            background: var(--color-primary-light);
            color: var(--color-primary-dark);
            font-weight: var(--font-weight-semibold);
        }

        /* Category Tabs */
        .category-tabs {
            background: var(--color-white);
            padding: var(--space-3) var(--space-4);
            display: flex;
            gap: var(--space-2);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .category-tab {
            padding: var(--space-2) var(--space-4);
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            color: var(--color-gray-600);
            background: var(--color-gray-100);
            border: none;
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: all var(--transition-fast);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .category-tab.active {
            background: var(--color-primary);
            color: var(--color-white);
        }

        .category-tab__count {
            margin-left: var(--space-1);
            font-size: var(--font-size-xs);
            opacity: 0.8;
        }

        /* Content Sections */
        .search-content {
            padding: var(--space-4);
        }

        /* Popular Keywords */
        .popular-keywords {
            background: var(--color-white);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
        }

        .popular-keywords__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-3);
        }

        .popular-keywords__title {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-semibold);
            color: var(--color-gray-900);
        }

        .popular-keywords__refresh {
            font-size: 18px;
            cursor: pointer;
            color: var(--color-gray-500);
            transition: all var(--transition-fast);
        }

        .popular-keywords__refresh:active {
            transform: rotate(180deg);
        }

        .popular-keywords__list {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }

        .popular-keyword-item {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            cursor: pointer;
            padding: var(--space-2);
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
        }

        .popular-keyword-item:active {
            background: var(--color-gray-50);
        }

        .popular-keyword-item__rank {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-bold);
            color: var(--color-white);
            background: var(--color-gray-400);
            border-radius: var(--radius-sm);
        }

        .popular-keyword-item__rank.top {
            background: var(--color-primary);
        }

        .popular-keyword-item__text {
            flex: 1;
            font-size: var(--font-size-base);
            color: var(--color-gray-900);
        }

        .popular-keyword-item__change {
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-semibold);
        }

        .popular-keyword-item__change.up {
            color: var(--color-error);
        }

        .popular-keyword-item__change.down {
            color: var(--color-info);
        }

        .popular-keyword-item__change.new {
            color: var(--color-primary);
        }

        /* Recent Searches */
        .recent-searches {
            background: var(--color-white);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
        }

        .recent-searches__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-3);
        }

        .recent-searches__title {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-semibold);
            color: var(--color-gray-900);
        }

        .recent-searches__clear {
            font-size: var(--font-size-sm);
            color: var(--color-gray-500);
            cursor: pointer;
        }

        .recent-searches__list {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
        }

        .recent-search-tag {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-3);
            background: var(--color-gray-100);
            border-radius: var(--radius-full);
            font-size: var(--font-size-sm);
            color: var(--color-gray-700);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .recent-search-tag:active {
            background: var(--color-gray-200);
        }

        .recent-search-tag__remove {
            font-size: 16px;
            color: var(--color-gray-500);
        }

        /* Search Results */
        .search-results {
            display: none;
        }

        .search-results.visible {
            display: block;
        }

        .search-results__header {
            padding: var(--space-4);
            background: var(--color-white);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-4);
        }

        .search-results__count {
            font-size: var(--font-size-base);
            color: var(--color-gray-700);
        }

        .search-results__count strong {
            color: var(--color-primary);
            font-weight: var(--font-weight-bold);
        }

        /* Result Section */
        .result-section {
            background: var(--color-white);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
        }

        .result-section__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-4);
        }

        .result-section__title {
            font-size: var(--font-size-md);
            font-weight: var(--font-weight-bold);
            color: var(--color-gray-900);
        }

        .result-section__more {
            font-size: var(--font-size-sm);
            color: var(--color-gray-500);
            cursor: pointer;
        }

        /* Product Result */
        .product-result {
            display: flex;
            gap: var(--space-3);
            padding: var(--space-3);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .product-result:active {
            background: var(--color-gray-50);
        }

        .product-result + .product-result {
            border-top: 1px solid var(--color-gray-100);
        }

        .product-result__image {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-lg);
            background: var(--color-gray-100);
            overflow: hidden;
            flex-shrink: 0;
        }

        .product-result__image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-result__content {
            flex: 1;
            min-width: 0;
        }

        .product-result__category {
            font-size: var(--font-size-xs);
            color: var(--color-primary);
            font-weight: var(--font-weight-semibold);
            margin-bottom: var(--space-1);
        }

        .product-result__title {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-medium);
            color: var(--color-gray-900);
            margin-bottom: var(--space-1);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .product-result__title mark {
            background: var(--color-primary-light);
            color: var(--color-primary-dark);
            font-weight: var(--font-weight-bold);
        }

        .product-result__desc {
            font-size: var(--font-size-sm);
            color: var(--color-gray-600);
            margin-bottom: var(--space-2);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .product-result__price {
            font-size: var(--font-size-md);
            font-weight: var(--font-weight-bold);
            color: var(--color-gray-900);
        }

        /* Content Result */
        .content-result {
            padding: var(--space-3);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .content-result:active {
            background: var(--color-gray-50);
        }

        .content-result + .content-result {
            border-top: 1px solid var(--color-gray-100);
        }

        .content-result__category {
            font-size: var(--font-size-xs);
            color: var(--color-primary);
            font-weight: var(--font-weight-semibold);
            margin-bottom: var(--space-1);
        }

        .content-result__title {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-medium);
            color: var(--color-gray-900);
            margin-bottom: var(--space-2);
            line-height: var(--line-height-normal);
        }

        .content-result__title mark {
            background: var(--color-primary-light);
            color: var(--color-primary-dark);
            font-weight: var(--font-weight-bold);
        }

        .content-result__desc {
            font-size: var(--font-size-sm);
            color: var(--color-gray-600);
            line-height: var(--line-height-relaxed);
            margin-bottom: var(--space-2);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .content-result__meta {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            font-size: var(--font-size-xs);
            color: var(--color-gray-500);
        }

        .content-result__meta span:not(:last-child)::after {
            content: '·';
            margin-left: var(--space-2);
        }

        /* Related Searches */
        .related-searches {
            background: var(--color-white);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
        }

        .related-searches__title {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-semibold);
            color: var(--color-gray-900);
            margin-bottom: var(--space-3);
        }

        .related-searches__list {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
        }

        .related-search-tag {
            padding: var(--space-2) var(--space-3);
            background: var(--color-gray-100);
            border-radius: var(--radius-full);
            font-size: var(--font-size-sm);
            color: var(--color-gray-700);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .related-search-tag:active {
            background: var(--color-gray-200);
        }

        /* No Results */
        .no-results {
            display: none;
            text-align: center;
            padding: var(--space-12) var(--space-4);
        }

        .no-results.visible {
            display: block;
        }

        .no-results__icon {
            font-size: 64px;
            margin-bottom: var(--space-4);
            opacity: 0.5;
        }

        .no-results__title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-bold);
            color: var(--color-gray-900);
            margin-bottom: var(--space-2);
        }

        .no-results__desc {
            font-size: var(--font-size-base);
            color: var(--color-gray-600);
            margin-bottom: var(--space-6);
            line-height: var(--line-height-relaxed);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--color-white);
            border-top: 1px solid var(--color-gray-200);
            padding: var(--space-2) 0;
            display: flex;
            justify-content: space-around;
            z-index: var(--z-sticky);
        }

        @media (min-width: 768px) {
            .bottom-nav {
                max-width: var(--max-width-mobile);
                left: 50%;
                transform: translateX(-50%);
            }
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-1);
            padding: var(--space-2);
            color: var(--color-gray-500);
            text-decoration: none;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .nav-item.active {
            color: var(--color-primary);
        }

        .nav-item__icon {
            font-size: 24px;
        }

        .nav-item__label {
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-medium);
        }

        /* Hidden State */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Search Header -->
    <header class="search-header">
        <div class="search-bar">
            <span class="search-bar__back" onclick="history.back()">←</span>
            <div class="search-bar__input-wrapper">
                <input
                    type="text"
                    class="search-bar__input"
                    id="searchInput"
                    placeholder="상품명, 이벤트, 공지사항 검색"
                    autocomplete="off"
                >
                <span class="search-bar__clear" id="clearBtn">×</span>

                <!-- Auto Suggestions -->
                <div class="suggestions" id="suggestions">
                    <div class="suggestion-item" data-keyword="딸기">
                        <span class="suggestion-item__icon">🔍</span>
                        <span class="suggestion-item__text">딸기</span>
                    </div>
                    <div class="suggestion-item" data-keyword="수박">
                        <span class="suggestion-item__icon">🔍</span>
                        <span class="suggestion-item__text">수박</span>
                    </div>
                    <div class="suggestion-item" data-keyword="멜론">
                        <span class="suggestion-item__icon">🔍</span>
                        <span class="suggestion-item__text">멜론</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Category Tabs -->
        <div class="category-tabs" id="categoryTabs">
            <button class="category-tab active" data-category="all">
                전체<span class="category-tab__count" id="countAll"></span>
            </button>
            <button class="category-tab" data-category="product">
                상품<span class="category-tab__count" id="countProduct"></span>
            </button>
            <button class="category-tab" data-category="event">
                이벤트<span class="category-tab__count" id="countEvent"></span>
            </button>
            <button class="category-tab" data-category="notice">
                공지사항<span class="category-tab__count" id="countNotice"></span>
            </button>
            <button class="category-tab" data-category="faq">
                FAQ<span class="category-tab__count" id="countFaq"></span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="search-content">
        <!-- Default State: Popular Keywords & Recent Searches -->
        <div id="defaultState">
            <!-- Popular Keywords -->
            <div class="popular-keywords">
                <div class="popular-keywords__header">
                    <h3 class="popular-keywords__title">인기 검색어</h3>
                    <span class="popular-keywords__refresh" onclick="refreshPopularKeywords()">🔄</span>
                </div>
                <div class="popular-keywords__list" id="popularKeywordsList">
                    <div class="popular-keyword-item" onclick="searchKeyword('제주 한라봉')">
                        <span class="popular-keyword-item__rank top">1</span>
                        <span class="popular-keyword-item__text">제주 한라봉</span>
                        <span class="popular-keyword-item__change up">▲ 2</span>
                    </div>
                    <div class="popular-keyword-item" onclick="searchKeyword('샤인머스켓')">
                        <span class="popular-keyword-item__rank top">2</span>
                        <span class="popular-keyword-item__text">샤인머스켓</span>
                        <span class="popular-keyword-item__change up">▲ 1</span>
                    </div>
                    <div class="popular-keyword-item" onclick="searchKeyword('딸기')">
                        <span class="popular-keyword-item__rank top">3</span>
                        <span class="popular-keyword-item__text">딸기</span>
                        <span class="popular-keyword-item__change down">▼ 1</span>
                    </div>
                    <div class="popular-keyword-item" onclick="searchKeyword('사과')">
                        <span class="popular-keyword-item__rank">4</span>
                        <span class="popular-keyword-item__text">사과</span>
                        <span class="popular-keyword-item__change">-</span>
                    </div>
                    <div class="popular-keyword-item" onclick="searchKeyword('수박')">
                        <span class="popular-keyword-item__rank">5</span>
                        <span class="popular-keyword-item__text">수박</span>
                        <span class="popular-keyword-item__change new">NEW</span>
                    </div>
                </div>
            </div>

            <!-- Recent Searches -->
            <div class="recent-searches" id="recentSearchesSection">
                <div class="recent-searches__header">
                    <h3 class="recent-searches__title">최근 검색</h3>
                    <span class="recent-searches__clear" onclick="clearRecentSearches()">전체삭제</span>
                </div>
                <div class="recent-searches__list" id="recentSearchesList">
                    <!-- Recent searches will be dynamically added here -->
                </div>
            </div>
        </div>

        <!-- Search Results State -->
        <div id="searchResultsState">
            <!-- Results Header -->
            <div class="search-results__header">
                <p class="search-results__count">
                    '<strong id="searchKeyword"></strong>' 검색결과 <strong id="totalResults"></strong>건
                </p>
            </div>

            <!-- Product Results -->
            <div class="result-section" id="productResults">
                <div class="result-section__header">
                    <h3 class="result-section__title">상품</h3>
                    <span class="result-section__more">더보기 →</span>
                </div>
                <div id="productResultsList">
                    <!-- Product results will be dynamically added here -->
                </div>
            </div>

            <!-- Event Results -->
            <div class="result-section" id="eventResults">
                <div class="result-section__header">
                    <h3 class="result-section__title">이벤트</h3>
                    <span class="result-section__more">더보기 →</span>
                </div>
                <div id="eventResultsList">
                    <!-- Event results will be dynamically added here -->
                </div>
            </div>

            <!-- Notice Results -->
            <div class="result-section" id="noticeResults">
                <div class="result-section__header">
                    <h3 class="result-section__title">공지사항</h3>
                    <span class="result-section__more">더보기 →</span>
                </div>
                <div id="noticeResultsList">
                    <!-- Notice results will be dynamically added here -->
                </div>
            </div>

            <!-- FAQ Results -->
            <div class="result-section" id="faqResults">
                <div class="result-section__header">
                    <h3 class="result-section__title">FAQ</h3>
                    <span class="result-section__more">더보기 →</span>
                </div>
                <div id="faqResultsList">
                    <!-- FAQ results will be dynamically added here -->
                </div>
            </div>

            <!-- Related Searches -->
            <div class="related-searches">
                <h3 class="related-searches__title">연관 검색어</h3>
                <div class="related-searches__list" id="relatedSearchesList">
                    <!-- Related searches will be dynamically added here -->
                </div>
            </div>
        </div>

        <!-- No Results State -->
        <div class="no-results" id="noResultsState">
            <div class="no-results__icon">🔍</div>
            <h3 class="no-results__title">검색 결과가 없습니다</h3>
            <p class="no-results__desc">
                다른 검색어를 입력하시거나<br>
                인기 검색어를 확인해보세요
            </p>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="../home/index.html" class="nav-item">
            <span class="nav-item__icon">🏠</span>
            <span class="nav-item__label">홈</span>
        </a>
        <a href="../products/index.html" class="nav-item">
            <span class="nav-item__icon">🍎</span>
            <span class="nav-item__label">상품</span>
        </a>
        <a href="../mypage/index.html" class="nav-item">
            <span class="nav-item__icon">👤</span>
            <span class="nav-item__label">마이</span>
        </a>
        <a href="../support/index.html" class="nav-item">
            <span class="nav-item__icon">💬</span>
            <span class="nav-item__label">고객지원</span>
        </a>
    </nav>

    <script>
        // Sample Data
        const sampleData = {
            products: [
                { id: 1, name: '제주 한라봉', category: '감귤류', desc: '당도 높은 제주산 한라봉', price: 29000, image: '🍊' },
                { id: 2, name: '샤인머스켓', category: '포도', desc: '껍질째 먹는 프리미엄 청포도', price: 45000, image: '🍇' },
                { id: 3, name: '국산 딸기', category: '딸기', desc: '달콤한 국내산 딸기', price: 18000, image: '🍓' },
                { id: 4, name: '사과', category: '사과', desc: '아삭한 국내산 사과', price: 24000, image: '🍎' },
                { id: 5, name: '수박', category: '수박', desc: '당도높은 시원한 수박', price: 35000, image: '🍉' }
            ],
            events: [
                { id: 1, title: '신규회원 가입 이벤트', desc: '신선한 과일 10% 할인 쿠폰 증정', date: '2026.03.18', views: 1234 },
                { id: 2, title: '봄맞이 과일 세일', desc: '딸기, 한라봉 등 봄 과일 특가', date: '2026.03.15', views: 2341 },
                { id: 3, title: '친구 초대 이벤트', desc: '친구 초대시 3000원 적립금 지급', date: '2026.03.10', views: 987 }
            ],
            notices: [
                { id: 1, title: '배송 지연 안내', desc: '명절 연휴로 인한 배송 지연 안내드립니다', date: '2026.03.17', views: 543 },
                { id: 2, title: '개인정보 처리방침 변경 안내', desc: '개인정보 처리방침이 일부 변경되었습니다', date: '2026.03.12', views: 234 }
            ],
            faqs: [
                { id: 1, title: '배송은 얼마나 걸리나요?', desc: '주문 후 평균 2-3일 소요됩니다', category: '배송', views: 1543 },
                { id: 2, title: '환불은 어떻게 하나요?', desc: '상품 수령 후 7일 이내 환불 가능합니다', category: '환불', views: 876 },
                { id: 3, title: '당도 보장이 되나요?', desc: '모든 제품은 당도 측정 후 발송됩니다', category: '상품', views: 654 }
            ]
        };

        // State Management
        let currentCategory = 'all';
        let searchQuery = '';
        let recentSearches = JSON.parse(localStorage.getItem('recentSearches') || '[]');

        // DOM Elements
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        const suggestions = document.getElementById('suggestions');
        const defaultState = document.getElementById('defaultState');
        const searchResultsState = document.getElementById('searchResultsState');
        const noResultsState = document.getElementById('noResultsState');
        const categoryTabs = document.querySelectorAll('.category-tab');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadRecentSearches();
            setupEventListeners();
            showDefaultState();
        });

        // Setup Event Listeners
        function setupEventListeners() {
            // Search input
            searchInput.addEventListener('input', handleSearchInput);
            searchInput.addEventListener('focus', () => {
                if (searchInput.value.length > 0) {
                    updateSuggestions(searchInput.value);
                }
            });
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    performSearch(searchInput.value);
                }
            });

            // Clear button
            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                clearBtn.classList.remove('visible');
                suggestions.classList.remove('visible');
                showDefaultState();
            });

            // Category tabs
            categoryTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    categoryTabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentCategory = tab.dataset.category;
                    if (searchQuery) {
                        filterResults(currentCategory);
                    }
                });
            });

            // Close suggestions when clicking outside
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-bar__input-wrapper')) {
                    suggestions.classList.remove('visible');
                }
            });

            // Suggestion items
            document.addEventListener('click', (e) => {
                if (e.target.closest('.suggestion-item')) {
                    const keyword = e.target.closest('.suggestion-item').dataset.keyword;
                    performSearch(keyword);
                }
            });
        }

        // Handle Search Input
        function handleSearchInput(e) {
            const value = e.target.value;

            if (value.length > 0) {
                clearBtn.classList.add('visible');
                updateSuggestions(value);
            } else {
                clearBtn.classList.remove('visible');
                suggestions.classList.remove('visible');
                showDefaultState();
            }
        }

        // Update Suggestions
        function updateSuggestions(query) {
            const keywords = ['딸기', '수박', '멜론', '사과', '포도', '한라봉', '샤인머스켓', '체리'];
            const filtered = keywords.filter(k => k.includes(query));

            if (filtered.length > 0) {
                suggestions.innerHTML = filtered.map(keyword => {
                    const highlighted = keyword.replace(
                        new RegExp(query, 'gi'),
                        match => `<mark>${match}</mark>`
                    );
                    return `
                        <div class="suggestion-item" data-keyword="${keyword}">
                            <span class="suggestion-item__icon">🔍</span>
                            <span class="suggestion-item__text">${highlighted}</span>
                        </div>
                    `;
                }).join('');
                suggestions.classList.add('visible');
            } else {
                suggestions.classList.remove('visible');
            }
        }

        // Perform Search
        function performSearch(keyword) {
            if (!keyword || keyword.trim() === '') return;

            searchQuery = keyword.trim();
            searchInput.value = searchQuery;
            suggestions.classList.remove('visible');

            // Add to recent searches
            addRecentSearch(searchQuery);

            // Show results
            displaySearchResults(searchQuery);
        }

        // Search Keyword (from popular keywords)
        function searchKeyword(keyword) {
            searchInput.value = keyword;
            performSearch(keyword);
        }

        // Display Search Results
        function displaySearchResults(query) {
            // Hide default state, show results
            defaultState.classList.add('hidden');
            noResultsState.classList.remove('visible');
            searchResultsState.classList.remove('hidden');

            // Update search keyword display
            document.getElementById('searchKeyword').textContent = query;

            // Search in all data
            const productResults = searchInData(sampleData.products, query, 'name');
            const eventResults = searchInData(sampleData.events, query, 'title');
            const noticeResults = searchInData(sampleData.notices, query, 'title');
            const faqResults = searchInData(sampleData.faqs, query, 'title');

            // Update counts
            const totalCount = productResults.length + eventResults.length + noticeResults.length + faqResults.length;
            document.getElementById('totalResults').textContent = totalCount;
            updateCategoryCounts(productResults.length, eventResults.length, noticeResults.length, faqResults.length);

            // Display results
            if (totalCount === 0) {
                showNoResults();
            } else {
                displayProductResults(productResults, query);
                displayEventResults(eventResults, query);
                displayNoticeResults(noticeResults, query);
                displayFaqResults(faqResults, query);
                displayRelatedSearches(query);

                // Filter by current category
                filterResults(currentCategory);
            }
        }

        // Search in Data
        function searchInData(data, query, field) {
            return data.filter(item =>
                item[field].toLowerCase().includes(query.toLowerCase()) ||
                (item.desc && item.desc.toLowerCase().includes(query.toLowerCase()))
            );
        }

        // Display Product Results
        function displayProductResults(results, query) {
            const container = document.getElementById('productResultsList');
            const section = document.getElementById('productResults');

            if (results.length === 0) {
                section.classList.add('hidden');
                return;
            }

            section.classList.remove('hidden');
            container.innerHTML = results.map(product => {
                const highlightedName = highlightText(product.name, query);
                return `
                    <div class="product-result" onclick="location.href='../products/detail.html?id=${product.id}'">
                        <div class="product-result__image">
                            <span style="font-size: 48px;">${product.image}</span>
                        </div>
                        <div class="product-result__content">
                            <p class="product-result__category">${product.category}</p>
                            <h4 class="product-result__title">${highlightedName}</h4>
                            <p class="product-result__desc">${product.desc}</p>
                            <p class="product-result__price">${product.price.toLocaleString()}원</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Display Event Results
        function displayEventResults(results, query) {
            const container = document.getElementById('eventResultsList');
            const section = document.getElementById('eventResults');

            if (results.length === 0) {
                section.classList.add('hidden');
                return;
            }

            section.classList.remove('hidden');
            container.innerHTML = results.map(event => {
                const highlightedTitle = highlightText(event.title, query);
                return `
                    <div class="content-result" onclick="location.href='../event/detail.html?id=${event.id}'">
                        <p class="content-result__category">이벤트</p>
                        <h4 class="content-result__title">${highlightedTitle}</h4>
                        <p class="content-result__desc">${event.desc}</p>
                        <div class="content-result__meta">
                            <span>${event.date}</span>
                            <span>조회 ${event.views}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Display Notice Results
        function displayNoticeResults(results, query) {
            const container = document.getElementById('noticeResultsList');
            const section = document.getElementById('noticeResults');

            if (results.length === 0) {
                section.classList.add('hidden');
                return;
            }

            section.classList.remove('hidden');
            container.innerHTML = results.map(notice => {
                const highlightedTitle = highlightText(notice.title, query);
                return `
                    <div class="content-result" onclick="location.href='../support/notice.html?id=${notice.id}'">
                        <p class="content-result__category">공지사항</p>
                        <h4 class="content-result__title">${highlightedTitle}</h4>
                        <p class="content-result__desc">${notice.desc}</p>
                        <div class="content-result__meta">
                            <span>${notice.date}</span>
                            <span>조회 ${notice.views}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Display FAQ Results
        function displayFaqResults(results, query) {
            const container = document.getElementById('faqResultsList');
            const section = document.getElementById('faqResults');

            if (results.length === 0) {
                section.classList.add('hidden');
                return;
            }

            section.classList.remove('hidden');
            container.innerHTML = results.map(faq => {
                const highlightedTitle = highlightText(faq.title, query);
                return `
                    <div class="content-result" onclick="location.href='../support/faq.html?id=${faq.id}'">
                        <p class="content-result__category">FAQ · ${faq.category}</p>
                        <h4 class="content-result__title">${highlightedTitle}</h4>
                        <p class="content-result__desc">${faq.desc}</p>
                        <div class="content-result__meta">
                            <span>조회 ${faq.views}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Display Related Searches
        function displayRelatedSearches(query) {
            const relatedKeywords = ['신선한 과일', '제철 과일', '과일 선물', '당도높은 과일', '유기농 과일'];
            const container = document.getElementById('relatedSearchesList');

            container.innerHTML = relatedKeywords.map(keyword => `
                <span class="related-search-tag" onclick="searchKeyword('${keyword}')">${keyword}</span>
            `).join('');
        }

        // Highlight Text
        function highlightText(text, query) {
            const regex = new RegExp(`(${query})`, 'gi');
            return text.replace(regex, '<mark>$1</mark>');
        }

        // Update Category Counts
        function updateCategoryCounts(productCount, eventCount, noticeCount, faqCount) {
            const total = productCount + eventCount + noticeCount + faqCount;
            document.getElementById('countAll').textContent = total > 0 ? ` ${total}` : '';
            document.getElementById('countProduct').textContent = productCount > 0 ? ` ${productCount}` : '';
            document.getElementById('countEvent').textContent = eventCount > 0 ? ` ${eventCount}` : '';
            document.getElementById('countNotice').textContent = noticeCount > 0 ? ` ${noticeCount}` : '';
            document.getElementById('countFaq').textContent = faqCount > 0 ? ` ${faqCount}` : '';
        }

        // Filter Results by Category
        function filterResults(category) {
            const sections = {
                product: document.getElementById('productResults'),
                event: document.getElementById('eventResults'),
                notice: document.getElementById('noticeResults'),
                faq: document.getElementById('faqResults')
            };

            if (category === 'all') {
                Object.values(sections).forEach(section => {
                    if (!section.classList.contains('hidden')) {
                        section.style.display = 'block';
                    }
                });
            } else {
                Object.entries(sections).forEach(([key, section]) => {
                    if (key === category) {
                        section.style.display = 'block';
                    } else {
                        section.style.display = 'none';
                    }
                });
            }
        }

        // Show No Results
        function showNoResults() {
            defaultState.classList.add('hidden');
            searchResultsState.classList.add('hidden');
            noResultsState.classList.add('visible');
        }

        // Show Default State
        function showDefaultState() {
            defaultState.classList.remove('hidden');
            searchResultsState.classList.add('hidden');
            noResultsState.classList.remove('visible');
            searchQuery = '';

            // Reset category tabs
            categoryTabs.forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.category === 'all') {
                    tab.classList.add('active');
                }
            });
            currentCategory = 'all';

            // Clear category counts
            document.getElementById('countAll').textContent = '';
            document.getElementById('countProduct').textContent = '';
            document.getElementById('countEvent').textContent = '';
            document.getElementById('countNotice').textContent = '';
            document.getElementById('countFaq').textContent = '';
        }

        // Recent Searches Management
        function addRecentSearch(keyword) {
            // Remove if already exists
            recentSearches = recentSearches.filter(k => k !== keyword);

            // Add to beginning
            recentSearches.unshift(keyword);

            // Keep only last 10
            if (recentSearches.length > 10) {
                recentSearches = recentSearches.slice(0, 10);
            }

            // Save to localStorage
            localStorage.setItem('recentSearches', JSON.stringify(recentSearches));

            // Update UI
            loadRecentSearches();
        }

        function loadRecentSearches() {
            const container = document.getElementById('recentSearchesList');
            const section = document.getElementById('recentSearchesSection');

            if (recentSearches.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            container.innerHTML = recentSearches.map(keyword => `
                <span class="recent-search-tag">
                    <span onclick="searchKeyword('${keyword}')">${keyword}</span>
                    <span class="recent-search-tag__remove" onclick="removeRecentSearch('${keyword}')">×</span>
                </span>
            `).join('');
        }

        function removeRecentSearch(keyword) {
            recentSearches = recentSearches.filter(k => k !== keyword);
            localStorage.setItem('recentSearches', JSON.stringify(recentSearches));
            loadRecentSearches();
        }

        function clearRecentSearches() {
            if (confirm('최근 검색어를 모두 삭제하시겠습니까?')) {
                recentSearches = [];
                localStorage.setItem('recentSearches', JSON.stringify(recentSearches));
                loadRecentSearches();
            }
        }

        // Refresh Popular Keywords
        function refreshPopularKeywords() {
            const keywords = [
                { text: '제주 한라봉', rank: 1, change: 'up', value: 2 },
                { text: '샤인머스켓', rank: 2, change: 'up', value: 1 },
                { text: '딸기', rank: 3, change: 'down', value: 1 },
                { text: '사과', rank: 4, change: 'same', value: 0 },
                { text: '수박', rank: 5, change: 'new', value: 0 }
            ];

            // Shuffle keywords for demo
            const shuffled = keywords.sort(() => Math.random() - 0.5).slice(0, 5);

            const container = document.getElementById('popularKeywordsList');
            container.innerHTML = shuffled.map((item, index) => {
                const rankClass = index < 3 ? 'top' : '';
                const changeText = item.change === 'up' ? `▲ ${item.value}` :
                                   item.change === 'down' ? `▼ ${item.value}` :
                                   item.change === 'new' ? 'NEW' : '-';
                const changeClass = item.change;

                return `
                    <div class="popular-keyword-item" onclick="searchKeyword('${item.text}')">
                        <span class="popular-keyword-item__rank ${rankClass}">${index + 1}</span>
                        <span class="popular-keyword-item__text">${item.text}</span>
                        <span class="popular-keyword-item__change ${changeClass}">${changeText}</span>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
