<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>장바구니 - 과일다리</title>
    <link rel="stylesheet" href="../../styles/design-system.css">
    <link rel="stylesheet" href="../../styles/components.css">
    <link rel="stylesheet" href="../../styles/common-layout.css">
</head>
<body>
    <div class="auth-container">
        <!-- Header -->
        <header class="cart-header">
            <div class="cart-header-content">
                <button class="back-button" onclick="history.back()">←</button>
                <h1 class="cart-title">장바구니</h1>
                <button class="cart-clear" onclick="clearCart()">비우기</button>
            </div>
        </header>

        <!-- Select All Bar -->
        <div class="select-all-bar">
            <div class="select-all-left">
                <div class="checkbox checked" onclick="toggleSelectAll(this)"></div>
                <span class="select-all-text">전체선택 (3/3)</span>
            </div>
            <button class="delete-selected" onclick="deleteSelected()">선택삭제</button>
        </div>

        <!-- Cart Items -->
        <div class="cart-items">
            <!-- Cart Item 1 -->
            <div class="cart-item">
                <div class="cart-item-header">
                    <div class="checkbox checked" onclick="toggleItem(this)"></div>
                </div>
                <div class="cart-item-content">
                    <div class="cart-item-image">🍊</div>
                    <div class="cart-item-info">
                        <div class="cart-item-name">제주 한라봉</div>
                        <div class="cart-item-option">3kg / 프리미엄</div>
                        <div class="cart-item-price">32,000원</div>
                        <div class="quantity-control">
                            <button class="qty-button" onclick="decreaseQty(this)">−</button>
                            <input type="text" class="qty-input" value="1" readonly>
                            <button class="qty-button" onclick="increaseQty(this)">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Cart Item 2 -->
            <div class="cart-item">
                <div class="cart-item-header">
                    <div class="checkbox checked" onclick="toggleItem(this)"></div>
                </div>
                <div class="cart-item-content">
                    <div class="cart-item-image" style="background: linear-gradient(135deg, #FFE8E8, #FFB8B8);">🍓</div>
                    <div class="cart-item-info">
                        <div class="cart-item-name">논산 딸기</div>
                        <div class="cart-item-option">500g x 2팩</div>
                        <div class="cart-item-price">28,000원</div>
                        <div class="quantity-control">
                            <button class="qty-button" onclick="decreaseQty(this)">−</button>
                            <input type="text" class="qty-input" value="2" readonly>
                            <button class="qty-button" onclick="increaseQty(this)">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Cart Item 3 -->
            <div class="cart-item">
                <div class="cart-item-header">
                    <div class="checkbox checked" onclick="toggleItem(this)"></div>
                </div>
                <div class="cart-item-content">
                    <div class="cart-item-image" style="background: linear-gradient(135deg, #FFF8DC, #FFE4B5);">🍌</div>
                    <div class="cart-item-info">
                        <div class="cart-item-name">필리핀 바나나</div>
                        <div class="cart-item-option">1.5kg / 유기농</div>
                        <div class="cart-item-price">8,900원</div>
                        <div class="quantity-control">
                            <button class="qty-button" onclick="decreaseQty(this)">−</button>
                            <input type="text" class="qty-input" value="1" readonly>
                            <button class="qty-button" onclick="increaseQty(this)">+</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Delivery Notice -->
        <div class="delivery-notice">
            <span class="delivery-notice-icon">🚚</span>
            <span>30,000원 이상 무료배송 (현재: 96,900원)</span>
        </div>

        <!-- Coupon Section -->
        <div class="coupon-section">
            <div class="coupon-header">
                <h3 class="coupon-title">쿠폰</h3>
                <span class="coupon-count">보유 쿠폰 3장</span>
            </div>
            <div class="coupon-input-group">
                <input type="text" class="coupon-input" placeholder="쿠폰 코드를 입력하세요">
                <button class="coupon-apply">적용</button>
            </div>
        </div>

        <!-- Price Summary -->
        <div class="price-summary">
            <div class="price-row">
                <span>상품금액</span>
                <span>96,900원</span>
            </div>
            <div class="price-row discount">
                <span>상품할인</span>
                <span>-8,000원</span>
            </div>
            <div class="price-row discount">
                <span>쿠폰할인</span>
                <span>-5,000원</span>
            </div>
            <div class="price-row">
                <span>배송비</span>
                <span>무료</span>
            </div>
            <div class="price-row total">
                <span>결제예정금액</span>
                <span>83,900원</span>
            </div>
        </div>

        <!-- Bottom Fixed Area -->
        <div class="bottom-fixed">
            <div class="order-summary">
                <span class="order-summary-text">총 3개</span>
                <span class="order-summary-price">83,900원</span>
            </div>
            <button class="order-button" onclick="proceedToOrder()">
                83,900원 주문하기
            </button>
        </div>
    </div>

    <script>
        // Toggle select all
        function toggleSelectAll(element) {
            element.classList.toggle('checked');
            const itemCheckboxes = document.querySelectorAll('.cart-item .checkbox');
            const isChecked = element.classList.contains('checked');

            itemCheckboxes.forEach(checkbox => {
                if (isChecked) {
                    checkbox.classList.add('checked');
                } else {
                    checkbox.classList.remove('checked');
                }
            });

            updateSelectCount();
            updateOrderButton();
        }

        // Toggle individual item
        function toggleItem(element) {
            element.classList.toggle('checked');
            updateSelectCount();
            updateOrderButton();
        }

        // Update select count
        function updateSelectCount() {
            const totalItems = document.querySelectorAll('.cart-item .checkbox').length;
            const checkedItems = document.querySelectorAll('.cart-item .checkbox.checked').length;
            const selectAllText = document.querySelector('.select-all-text');
            const selectAllCheckbox = document.querySelector('.select-all-bar .checkbox');

            selectAllText.textContent = `전체선택 (${checkedItems}/${totalItems})`;

            if (checkedItems === totalItems && totalItems > 0) {
                selectAllCheckbox.classList.add('checked');
            } else {
                selectAllCheckbox.classList.remove('checked');
            }
        }

        // Update order button
        function updateOrderButton() {
            const checkedItems = document.querySelectorAll('.cart-item .checkbox.checked').length;
            const orderButton = document.querySelector('.order-button');
            const orderSummaryText = document.querySelector('.order-summary-text');

            if (checkedItems === 0) {
                orderButton.disabled = true;
                orderButton.textContent = '상품을 선택해주세요';
                orderSummaryText.textContent = '총 0개';
            } else {
                orderButton.disabled = false;
                orderButton.textContent = '83,900원 주문하기';
                orderSummaryText.textContent = `총 ${checkedItems}개`;
            }
        }

        // Quantity controls
        function decreaseQty(button) {
            const input = button.nextElementSibling;
            let value = parseInt(input.value);
            if (value > 1) {
                input.value = value - 1;
            }
        }

        function increaseQty(button) {
            const input = button.previousElementSibling;
            let value = parseInt(input.value);
            input.value = value + 1;
        }

        // Delete selected items
        function deleteSelected() {
            const checkedItems = document.querySelectorAll('.cart-item .checkbox.checked');
            if (checkedItems.length === 0) {
                alert('삭제할 상품을 선택해주세요');
                return;
            }

            if (confirm(`선택한 ${checkedItems.length}개 상품을 삭제하시겠습니까?`)) {
                checkedItems.forEach(checkbox => {
                    checkbox.closest('.cart-item').remove();
                });
                updateSelectCount();
                updateOrderButton();

                // Show empty state if no items left
                if (document.querySelectorAll('.cart-item').length === 0) {
                    showEmptyCart();
                }
            }
        }

        // Clear cart
        function clearCart() {
            if (confirm('장바구니를 비우시겠습니까?')) {
                showEmptyCart();
            }
        }

        // Show empty cart state
        function showEmptyCart() {
            const cartItems = document.querySelector('.cart-items');
            cartItems.innerHTML = `
                <div class="empty-cart">
                    <div class="empty-icon">🛒</div>
                    <h2 class="empty-title">장바구니가 비어있습니다</h2>
                    <p class="empty-desc">원하는 상품을 담아보세요</p>
                    <button class="shop-button" onclick="location.href='/products/all'">쇼핑 계속하기</button>
                </div>
            `;

            // Hide other sections
            document.querySelector('.select-all-bar').style.display = 'none';
            document.querySelector('.delivery-notice').style.display = 'none';
            document.querySelector('.coupon-section').style.display = 'none';
            document.querySelector('.price-summary').style.display = 'none';
            document.querySelector('.bottom-fixed').style.display = 'none';
        }

        // Proceed to order
        function proceedToOrder() {
            const checkedItems = document.querySelectorAll('.cart-item .checkbox.checked').length;
            if (checkedItems > 0) {
                location.href = '/order/checkout';
            }
        }
    </script>
</body>
</html>
